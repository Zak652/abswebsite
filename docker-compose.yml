services:
  postgres:
    image: postgres:16-alpine
    container_name: abs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abs_db}
      POSTGRES_USER: ${POSTGRES_USER:-abs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-abs_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-abs_user} -d ${POSTGRES_DB:-abs_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: abs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    image: abswebsite-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: abs_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      sh -c "python manage.py migrate --settings=abs_backend.settings.local &&
             python manage.py runserver 0.0.0.0:8000 --settings=abs_backend.settings.local"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=abs_backend.settings.local
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    image: abswebsite-backend:latest
    container_name: abs_celery_worker
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: celery -A abs_backend worker --loglevel=info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=abs_backend.settings.local
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    image: abswebsite-backend:latest
    container_name: abs_celery_beat
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: celery -A abs_backend beat --loglevel=info --scheduler
      django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=abs_backend.settings.local
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:20-alpine
    container_name: abs_frontend
    working_dir: /app
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: sh -c "npm install && npm run dev -- --port 5000 --hostname 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "5000:5000"
    environment:
      - CMS_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_SITE_URL=http://localhost:5000
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
